services:
  mysql:
    image: mysql:8.4
    container_name: redactio-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:-redactio}
      MYSQL_USER: ${MYSQL_USER:-redactio}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-redactio_dev_password}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-redactio_root_password}
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    volumes:
      - redactio_mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-u", "$$MYSQL_USER", "--password=$$MYSQL_PASSWORD"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  redactio_mysql_data:
