<VirtualHost *:80>
    ServerName redactio.evc-pae.fr

    ErrorLog ${APACHE_LOG_DIR}/redactio_error.log
    CustomLog ${APACHE_LOG_DIR}/redactio_access.log combined

    RewriteEngine On
    RewriteRule ^ https://%{HTTP_HOST}%{REQUEST_URI} [R=301,L]
</VirtualHost>

<IfModule mod_ssl.c>
<VirtualHost *:443>
    ServerName redactio.evc-pae.fr

    ErrorLog ${APACHE_LOG_DIR}/redactio_ssl_error.log
    CustomLog ${APACHE_LOG_DIR}/redactio_ssl_access.log combined

    ProxyPreserveHost On
    ProxyRequests Off

    RequestHeader set X-Forwarded-Proto "https"
    RequestHeader set X-Forwarded-Port "443"

    ProxyPass / http://127.0.0.1:3121/ timeout=300 retry=0
    ProxyPassReverse / http://127.0.0.1:3121/

    # Certbot can inject or update these certificate paths.
    SSLEngine on
    SSLCertificateFile /etc/letsencrypt/live/redactio.evc-pae.fr/fullchain.pem
    SSLCertificateKeyFile /etc/letsencrypt/live/redactio.evc-pae.fr/privkey.pem
</VirtualHost>
</IfModule>
